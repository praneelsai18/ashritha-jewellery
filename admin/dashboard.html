<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ashritha Jewellers - Admin Dashboard</title>
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              DEFAULT: '#5B2D8E', // The purple from Meesho-style screenshots
              light: '#F3EEFF',
            },
            gold: {
              DEFAULT: '#B8860B',
              light: '#F5E6C0'
            }
          }
        }
      }
    }
  </script>

  <style>
    body {
      background-color: #F8F9FA;
    }
    
    .glass-card {
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
    }
    
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: transparent;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #E5E7EB;
      border-radius: 10px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #D1D5DB;
    }
    
    /* Recharts tooltip styling fix */
    .recharts-tooltip-wrapper {
      outline: none !important;
    }
  </style>

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Recharts -->
  <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
  
  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div id="root"></div>

  <!-- Dummy Data -->
  <script type="text/babel" src="/admin/js/data/dummyData.js"></script>

  <!-- Components -->
  <script type="text/babel" src="/admin/js/components/Sidebar.jsx"></script>
  <script type="text/babel" src="/admin/js/components/Header.jsx"></script>
  <script type="text/babel" src="/admin/js/components/MetricCard.jsx"></script>
  <script type="text/babel" src="/admin/js/components/Charts.jsx"></script>
  <script type="text/babel" src="/admin/js/components/ProductTable.jsx"></script>
  
  <!-- Main App -->
  <script type="text/babel" src="/admin/js/App.jsx"></script>
  
</body>
</html>
